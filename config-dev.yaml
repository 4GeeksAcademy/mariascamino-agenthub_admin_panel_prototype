      desc: "Browses the open web and extracts clean text or structures datasets from target HTML pages safely."
      agents_enabled: 1
    - name: "Google Calendar API"
      desc: "Coordinates appointments, reads attendee availability slots, drafts descriptions, and schedules dynamic invites."
      agents_enabled: 1
    - name: "PDF Parser"
